<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AXON | RAG Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<!-- MERMAID FOR MIND MAP -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

<script>
mermaid.initialize({
startOnLoad:true,
theme:"dark"
});
</script>

<style>

:root{
--bg:#030303;
--accent:#bc77ff;
--panel:#0a0a0c;
--border:rgba(255,255,255,.08);
--text:#e0e0e0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Space Grotesk',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:var(--panel);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:25px;
border-bottom:1px solid var(--border);
}

.logo{
font-weight:700;
font-size:1.2rem;
color:var(--accent);
display:flex;
gap:10px;
align-items:center;
}

.logo-mark{
width:10px;
height:10px;
background:var(--accent);
transform:rotate(45deg);
box-shadow:0 0 10px var(--accent);
}

.new-chat-btn{
margin-top:20px;
width:100%;
padding:10px;
border:1px solid var(--accent);
background:rgba(188,119,255,.1);
color:var(--accent);
cursor:pointer;
font-family:'JetBrains Mono';
font-size:12px;
border-radius:6px;
}

/* HISTORY */

.history{
flex:1;
overflow-y:auto;
padding:20px;
}

.history-title{
font-size:10px;
font-family:'JetBrains Mono';
opacity:.5;
margin-bottom:10px;
}

.history-item{
padding:10px;
border-radius:6px;
font-size:12px;
margin-bottom:8px;
background:rgba(255,255,255,.03);
display:flex;
justify-content:space-between;
align-items:center;
}

.history-item.active{
background:rgba(188,119,255,.2);
border-left:3px solid var(--accent);
}

.history-actions{
display:flex;
gap:8px;
}

.history-actions button{
background:none;
border:none;
color:var(--accent);
cursor:pointer;
}

/* FOOTER */

.sidebar-footer{
padding:20px;
border-top:1px solid var(--border);
}

.sidebar-input{
width:100%;
padding:8px;
background:#000;
border:1px solid var(--border);
color:white;
font-family:'JetBrains Mono';
font-size:11px;
border-radius:4px;
margin-bottom:10px;
}

.upload-btn{
width:100%;
padding:10px;
background:transparent;
border:1px dashed var(--accent);
color:var(--accent);
cursor:pointer;
border-radius:6px;
font-family:'JetBrains Mono';
font-size:11px;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
padding:40px;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:30px;
border:1px solid var(--border);
border-radius:12px;
background:rgba(255,255,255,.02);
}

.message{margin-bottom:20px}

.user{text-align:right}

.user .bubble{
display:inline-block;
background:var(--accent);
color:black;
padding:12px 16px;
border-radius:20px;
max-width:60%;
}

.assistant .bubble{
display:inline-block;
background:#111;
padding:14px 18px;
border-radius:14px;
max-width:70%;
border-left:3px solid var(--accent);
}

.status{
margin-bottom:20px;
color:var(--accent);
font-family:'JetBrains Mono';
font-size:12px;
}

.command-bar{
display:flex;
gap:10px;
margin-top:20px;
background:var(--panel);
padding:10px;
border-radius:10px;
border:1px solid var(--border);
}

.command-bar input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
font-size:1rem;
}

.run-btn{
background:var(--accent);
border:none;
padding:0 25px;
border-radius:6px;
font-weight:700;
cursor:pointer;
}

/* MERMAID */

.mermaid{
margin-top:20px;
background:#0a0a0c;
padding:20px;
border-radius:10px;
border:1px solid rgba(255,255,255,.08);
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="sidebar-header">

<div class="logo">
<div class="logo-mark"></div>
DocuMind Pro
</div>

<form action="/new" method="post">
<button class="new-chat-btn">+ NEW CHAT</button>
</form>

</div>

<div class="history">

<div class="history-title">CHAT HISTORY</div>

{% for id, session in sessions.items() %}

<div class="history-item {% if id == current_session %}active{% endif %}">

<form action="/switch/{{ id }}" method="post">

<button style="background:none;border:none;color:white;">
{{ session.name }}
</button>

</form>

<div class="history-actions">

<button onclick="renameChat('{{ id }}')">✏️</button>

<form action="/delete/{{ id }}" method="post">
<button type="submit">🗑️</button>
</form>

</div>

</div>

{% endfor %}

</div>

<div class="sidebar-footer">

<input type="password"
id="api_key_input"
placeholder="GEMINI_API_KEY"
class="sidebar-input">

<form action="/upload" method="post" enctype="multipart/form-data">

<label class="upload-btn">

SELECT PDF

<input type="file"
name="file"
style="display:none;"
onchange="this.form.submit()">

</label>

</form>

</div>

</aside>

<!-- MAIN -->

<main class="main">

<div class="chat-box">

<div class="status">
[SYSTEM]: {{ status }}
</div>

{% for q,a in history %}

<div class="message user">
<div class="bubble">{{ q }}</div>
</div>

<div class="message assistant">
<div class="bubble">
{{ a|safe }}
</div>
</div>

{% endfor %}

</div>

<form action="/chat" method="post" class="command-bar">

<input type="hidden" name="api_key" id="hidden_api_key">

<input type="text"
name="question"
placeholder="Ask about your document..."
required
autocomplete="off">

<button type="submit" class="run-btn">RUN</button>

</form>

</main>

<script>

function renameChat(sessionId){

let newName = prompt("Enter new chat name:");

if(newName){

fetch(`/rename/${sessionId}`,{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:"new_name="+encodeURIComponent(newName)

}).then(()=>window.location.reload());

}

}

const chatForm = document.querySelector(".command-bar");

const apiInput = document.getElementById("api_key_input");

const hiddenApi = document.getElementById("hidden_api_key");

chatForm.addEventListener("submit",function(){

hiddenApi.value = apiInput.value;

});

</script>

</body>
</html>
